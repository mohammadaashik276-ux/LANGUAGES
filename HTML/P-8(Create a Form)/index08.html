<!DOCTYPE html>
<html>
    <head>
        <title>
            HTML-Project 08()
        </title>
        <style>
            body {
                background-image: url(bgi.jpg);
                background-size: cover;
                text-align: center;
            }
            h1 {
                color: rgb(206, 173, 173);
                text-align:center;
                font-size: 65px;
                font-family: Arial, Helvetica, sans-serif;
            }
            p {
                font-size: 30px;
                font-family: Arial, Helvetica, sans-serif;
                text-align: center;
            }
            input {
                padding: 8px;
                margin: 10px;
                border-radius: 8px;
                width: 400px;
                border: none;
            }
            div {
                margin: 0 auto;
                max-width: fit-content;
            }
        </style>
    </head>
    <body>
        <h1>
            Register Form
        </h1>
        <div>
            <form>
                <input type="text" placeholder="Enter Your Username" required><br/>
                <input type="email" placeholder="Enter Your Email" required><br/>
                <input type="password" placeholder="Enter Your Password" required><br/>
                <input type="submit" value="Register" style="width: 100px; ">
            </form>
        </div>
        
    </body>
</html>
