<!DOCTYPE html>
<html>
    <head>
        <title>
            HTML-Project 07(how to link an external CSS file to an HTML document)
        </title>
        <style>
            body {
                background-color: white;
            }
            h1 {
                color: brown;
                text-align:center;
                font-size: 60px;
                font-family: Arial, Helvetica, sans-serif;
            }
            p {
                font-size: 30px;
                font-family: Arial, Helvetica, sans-serif;
                text-align: center;
            }
            ul {
                list-style-type: none;

            }
            li {
                color: rgb(79, 52, 52);
                text-align:left;
                font-size: 20px;
                font-family: Arial, Helvetica, sans-serif;
                padding: 12px;
                
            }
            li:hover {
                font-style: italic;
                font-weight: 900;
            }
            a {
                color: black;
                text-decoration: none;
            }
            a:hover {
                color: rgb(237, 13, 80);
            }

        </style>
    </head>
    <body>
        <h1>
            CARS Selling Website
        </h1>
        <p>
            <b>Welcome to our car selling website! </b>
        </p>
        <ul>
            <li><a href="https://www.autolanka.com">Home</a></li>
            <li><a href="https://www.autolanka.com/terms-of-use.html" target="_blank">Terms of Use</a></li>
            <li><a href="https://autolanka.freshdesk.com/support/tickets/new" target="_blank">Contact Us</a></li>
            <li><a href="https://www.autolanka.com/my-favorites.html" target="_blank">Favorites</a></li>
        </ul>
    </body>
</html>
